<ion-content fullscreen>


  <div class="page">


    <h1>

      Mes favoris ⭐

    </h1>



    <div

      class="favorite-card"

      *ngFor="let city of favorites$ | async"

      (click)="openWeather(city)"
    >


      <div class="info">


        <h2>

          {{ city.name }}

        </h2>


        <p>

          {{ city.region }}

          -

          {{ city.country }}

        </p>


      </div>



      <button

        class="delete"

        (click)="remove(city); $event.stopPropagation()"

      >

        <ion-icon

          name="trash-outline">

        </ion-icon>


      </button>



    </div>


  </div>


</ion-content>
