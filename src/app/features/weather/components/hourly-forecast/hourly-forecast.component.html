<app-card>

  <div class="hourly-card">


    <h2>
      Prévisions horaires
    </h2>


    <div class="hourly-scroll">


      <div
        class="hour"
        *ngFor="let item of forecasts"
      >


        <span class="time">

          {{ item.time }}

        </span>



        <ion-icon
          name="partly-sunny-outline">
        </ion-icon>



        <span class="temperature">

          {{ item.temperature }}°

        </span>


      </div>


    </div>


  </div>


</app-card>
