<app-card>

  <div class="metric">


    <!-- Entête -->
    <div class="header">

      <div class="icon-box">

        <ion-icon
          [name]="icon">
        </ion-icon>

      </div>


      <span class="title">

        {{ title }}

      </span>


    </div>



    <!-- Valeur -->
    <div class="value">


      {{ value }}


      <small>

        {{ unit }}

      </small>


    </div>


  </div>


</app-card>
